name: Rust CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  # BootControl testing environment vars
  BOOTCONTROL_BUS: session

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain:
          - stable
          - beta

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.toolchain }}
        components: rustfmt, clippy
        
    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
          
    - name: Check Formatting
      run: cargo fmt --all -- --check
      
    - name: Run Clippy
      run: cargo clippy --workspace --tests -- -D warnings
      
    - name: Run Tests
      run: cargo test --workspace

  # ── E2E test job ────────────────────────────────────────────────────────────
  # Runs the workspace-level integration test binary (`tests/e2e/`) against a
  # live bootcontrold subprocess on the D-Bus session bus.
  #
  # Separate from `build` so fast unit tests and slow E2E tests are distinct
  # in the CI dashboard, and so E2E failures do not block the matrix run.
  #
  # Linux-only: D-Bus session bus + POSIX flock semantics are not available on
  # macOS or Windows runners.
  e2e:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v3

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: stable
        components: clippy

    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-e2e-
          ${{ runner.os }}-cargo-

    - name: Install D-Bus
      run: sudo apt-get install -y dbus

    - name: Start D-Bus session bus
      run: |
        # Launch a session bus and export its address to subsequent steps.
        eval $(dbus-launch --sh-syntax)
        echo "DBUS_SESSION_BUS_ADDRESS=${DBUS_SESSION_BUS_ADDRESS}" >> "${GITHUB_ENV}"

    - name: Clippy — E2E test code
      run: cargo clippy -p bootcontrol-e2e --tests -- -D warnings

    - name: Run E2E tests
      env:
        BOOTCONTROL_BUS: session
      run: cargo test -p bootcontrol-e2e --test e2e -- --ignored --nocapture

<!DOCTYPE busconfig PUBLIC
  "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
  "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only root may own the org.bootcontrol.Manager bus name -->
  <policy user="root">
    <allow own="org.bootcontrol.Manager"/>
  </policy>

  <!-- Any user may call methods — Polkit handles per-operation authorization -->
  <policy context="default">
    <allow send_destination="org.bootcontrol.Manager"
           send_interface="org.bootcontrol.Manager"/>
    <allow send_destination="org.bootcontrol.Manager"
           send_interface="org.freedesktop.DBus.Introspectable"/>
    <allow send_destination="org.bootcontrol.Manager"
           send_interface="org.freedesktop.DBus.Properties"/>
  </policy>
</busconfig>

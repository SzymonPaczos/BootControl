<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only root can own the service -->
  <policy user="root">
    <allow own="org.bootcontrol.Manager"/>
  </policy>

  <!-- Anybody can send messages to the manager interface -->
  <policy context="default">
    <allow send_destination="org.bootcontrol.Manager"/>
    <!-- The manager must handle its own polkit authorization where necessary (e.g. SetGrubValue) -->
  </policy>
</busconfig>
